<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHIP Grant Calendar 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#002855;--orange:#C8500A;--white:#ffffff;
    --gray-50:#f8f9fb;--gray-100:#f0f2f5;--gray-200:#e2e6ed;
    --gray-400:#9ba5b4;--gray-600:#5a6478;--body:#1a2035;
    --c-sub:#185FA5;--c-sub-lt:#E6F1FB;
    --c-dec:#3B6D11;--c-dec-lt:#EAF3DE;
    --c-rev:#BA7517;--c-rev-lt:#FAEEDA;
    --c-rep:#A32D2D;--c-rep-lt:#FCEBEB;
    --c-fld:#534AB7;--c-fld-lt:#EEEDFE;
    --c-awd:#0F6E56;--c-awd-lt:#E1F5EE;
    --font:'DM Sans',system-ui,sans-serif;
    --mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--gray-50);color:var(--body);font-size:13px}

  /* HEADER */
  .site-header{background:var(--navy);color:white;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
  .site-header h1{font-size:17px;font-weight:500}
  .site-header p{font-size:11px;opacity:.55;margin-top:2px}
  .header-actions{display:flex;gap:8px;align-items:center}
  .hdr-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:white;font-family:var(--font);font-size:12px;cursor:pointer;transition:background .15s}
  .hdr-btn:hover{background:rgba(255,255,255,.15)}
  .hdr-btn.orange{background:var(--orange);border-color:var(--orange)}
  .hdr-btn.orange:hover{opacity:.85}

  /* CONTROLS */
  .controls{background:white;border-bottom:1px solid var(--gray-200);padding:10px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .controls-label{font-size:11px;font-weight:500;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em}
  .pill{padding:4px 12px;border-radius:20px;border:1px solid var(--gray-200);background:white;font-family:var(--font);font-size:12px;cursor:pointer;color:var(--gray-600);transition:all .15s}
  .pill:hover{border-color:var(--navy);color:var(--navy)}
  .pill.active{color:white;border-color:transparent}
  .pill[data-type="all"].active{background:var(--navy)}
  .pill[data-type="submission"].active{background:var(--c-sub)}
  .pill[data-type="decision"].active{background:var(--c-dec)}
  .pill[data-type="review"].active{background:var(--c-rev)}
  .pill[data-type="report"].active{background:var(--c-rep)}
  .pill[data-type="fieldwork"].active{background:var(--c-fld)}
  .pill[data-type="award"].active{background:var(--c-awd)}
  .sep{width:1px;height:20px;background:var(--gray-200);margin:0 2px}
  .nav-btns{display:flex;gap:6px;margin-left:auto}
  .nav-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--gray-200);background:white;font-family:var(--font);font-size:12px;cursor:pointer;color:var(--gray-600)}
  .nav-btn:hover{background:var(--gray-100)}

  /* LEGEND */
  .legend{padding:8px 28px;background:white;border-bottom:1px solid var(--gray-200);display:flex;gap:16px;flex-wrap:wrap}
  .leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray-600)}
  .leg-dot{width:8px;height:8px;border-radius:50%}

  /* LAYOUT */
  .layout{display:flex}
  .main{flex:1;min-width:0;padding:20px 28px}
  .sidebar{width:240px;flex-shrink:0;background:white;border-left:1px solid var(--gray-200);padding:16px 14px;min-height:calc(100vh - 120px)}
  .sidebar h3{font-size:12px;font-weight:500;color:var(--navy);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gray-200);text-transform:uppercase;letter-spacing:.06em}
  .upcoming-item{display:flex;gap:8px;margin-bottom:12px;align-items:flex-start;cursor:pointer}
  .upcoming-item:hover .upcoming-text{color:var(--navy)}
  .upcoming-date{font-family:var(--mono);font-size:10px;color:var(--gray-400);min-width:32px;margin-top:1px;line-height:1.4}
  .upcoming-text{font-size:11px;line-height:1.35;color:var(--body)}
  .upcoming-funder{font-size:10px;color:var(--gray-400);margin-top:1px}

  /* CALENDAR */
  .month-title{font-size:18px;font-weight:500;color:var(--navy);margin-bottom:2px}
  .month-year{font-size:12px;color:var(--gray-400);margin-bottom:12px;font-family:var(--mono)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid var(--gray-200);border-radius:10px;overflow:hidden;background:var(--gray-200);margin-bottom:28px}
  .day-header{background:var(--navy);color:rgba(255,255,255,.65);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;text-align:center;padding:7px 4px}
  .day-cell{background:white;min-height:100px;padding:5px;border-right:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200);vertical-align:top}
  .day-cell:nth-child(7n){border-right:none}
  .day-cell.empty{background:var(--gray-50)}
  .day-cell.today{background:#FFFBF0}
  .day-num{font-size:11px;font-weight:500;color:var(--gray-400);margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}
  .day-cell.today .day-num{background:var(--orange);color:white}
  .event-chip{border-radius:4px;padding:2px 5px;margin-bottom:2px;font-size:10px;font-weight:500;line-height:1.3;cursor:pointer;transition:opacity .15s;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .event-chip:hover{opacity:.7}
  .event-chip.hidden{display:none}
  .event-chip.t-submission{background:var(--c-sub-lt);color:var(--c-sub)}
  .event-chip.t-decision{background:var(--c-dec-lt);color:var(--c-dec)}
  .event-chip.t-review{background:var(--c-rev-lt);color:var(--c-rev)}
  .event-chip.t-report{background:var(--c-rep-lt);color:var(--c-rep)}
  .event-chip.t-fieldwork{background:var(--c-fld-lt);color:var(--c-fld)}
  .event-chip.t-award{background:var(--c-awd-lt);color:var(--c-awd)}
  .more-chip{font-size:10px;color:var(--gray-400);cursor:pointer;padding:1px 3px;display:block}
  .more-chip:hover{color:var(--navy)}

  /* MODAL — VIEW */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,40,85,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:white;border-radius:14px;padding:26px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative;max-height:90vh;overflow-y:auto}
  .modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:18px;color:var(--gray-400);cursor:pointer;line-height:1}
  .modal-type-badge{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:3px 10px;border-radius:20px;margin-bottom:10px}
  .modal-title{font-size:15px;font-weight:500;margin-bottom:16px;line-height:1.4;color:var(--body)}
  .modal-rows{display:flex;flex-direction:column;gap:7px}
  .modal-row{display:flex;gap:10px;font-size:12px}
  .modal-lbl{min-width:72px;font-weight:500;color:var(--gray-600)}
  .modal-val{color:var(--body);flex:1}
  .modal-div{height:1px;background:var(--gray-100);margin:12px 0}
  .modal-notes{font-size:12px;color:var(--gray-600);line-height:1.6;background:var(--gray-50);border-radius:8px;padding:10px 12px}
  .modal-actions{display:flex;gap:8px;margin-top:16px}
  .modal-btn{padding:7px 16px;border-radius:8px;font-family:var(--font);font-size:12px;cursor:pointer;font-weight:500;transition:all .15s}
  .btn-edit{background:var(--navy);color:white;border:none}
  .btn-edit:hover{opacity:.85}
  .btn-delete{background:white;color:#A32D2D;border:1px solid #A32D2D}
  .btn-delete:hover{background:#FCEBEB}
  .btn-cancel{background:white;color:var(--gray-600);border:1px solid var(--gray-200)}
  .btn-cancel:hover{background:var(--gray-50)}

  /* MODAL — EDIT / ADD */
  .edit-modal{background:white;border-radius:14px;padding:26px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative;max-height:92vh;overflow-y:auto}
  .edit-modal h2{font-size:16px;font-weight:500;margin-bottom:20px;color:var(--navy)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-full{grid-column:1/-1}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-label{font-size:10px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.07em}
  .form-input,.form-select,.form-textarea{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:8px 10px;color:var(--body);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s;width:100%}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--navy);background:white}
  .form-textarea{resize:vertical;min-height:80px}
  .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
  .btn-save{padding:8px 20px;border-radius:8px;border:none;background:var(--orange);color:white;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer}
  .btn-save:hover{opacity:.85}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:white;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}

  /* ── MOBILE ── */
  @media(max-width:768px){
    .site-header{flex-direction:column;align-items:flex-start;gap:10px;padding:14px 16px}
    .site-header h1{font-size:15px}
    .header-actions{width:100%;display:flex;gap:6px}
    .hdr-btn{flex:1;text-align:center;padding:8px 6px;font-size:11px}
    .controls{padding:10px 16px;gap:6px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
    .controls-label{display:none}
    .sep{display:none}
    .nav-btns{margin-left:0;flex-shrink:0}
    .pill{white-space:nowrap;flex-shrink:0}
    .legend{padding:8px 16px;gap:10px}
    .legend span:last-child{display:none}
    .layout{flex-direction:column}
    .main{padding:14px 12px}
    .sidebar{width:100%;border-left:none;border-top:1px solid var(--gray-200);padding:16px 12px;min-height:auto}
    .cal-grid{border-radius:8px}
    .day-header{font-size:9px;padding:6px 2px;letter-spacing:0}
    .day-cell{min-height:60px;padding:3px}
    .day-num{font-size:10px;width:18px;height:18px}
    .event-chip{font-size:9px;padding:2px 4px}
    .month-title{font-size:16px}
    #upcomingList{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
    .upcoming-item{flex-direction:column;min-width:130px;max-width:130px;background:var(--gray-50);border-radius:8px;padding:10px;margin-bottom:0}
    .upcoming-date{font-size:11px;margin-bottom:4px}
    .upcoming-text{font-size:11px}
    .modal-bg{padding:0;align-items:flex-end}
    .modal,.edit-modal{border-radius:16px 16px 0 0;max-width:100%;width:100%;max-height:85vh;padding:20px 20px 32px}
    .form-grid{grid-template-columns:1fr}
    .form-full{grid-column:1}
  }
</style>
</head>
<body>

<div class="site-header">
  <div>
    <h1>CHIP Grant &amp; Research Calendar 2026</h1>
    <p>Dr. Juan Aguilera · UTHealth Houston School of Public Health, El Paso</p>
  </div>
  <div class="header-actions">
    <span style="font-family:var(--mono);font-size:11px;opacity:.4" id="todayStr"></span>
    <button class="hdr-btn orange" onclick="openAdd()">+ Add Event</button>
  </div>
</div>

<div class="controls">
  <span class="controls-label">Filter</span>
  <button class="pill active" data-type="all" onclick="setFilter('all',this)">All</button>
  <button class="pill" data-type="submission" onclick="setFilter('submission',this)">Submissions</button>
  <button class="pill" data-type="decision" onclick="setFilter('decision',this)">Decisions</button>
  <button class="pill" data-type="review" onclick="setFilter('review',this)">Reviews</button>
  <button class="pill" data-type="report" onclick="setFilter('report',this)">Reports</button>
  <button class="pill" data-type="fieldwork" onclick="setFilter('fieldwork',this)">Field &amp; Training</button>
  <button class="pill" data-type="award" onclick="setFilter('award',this)">Awards</button>
  <div class="sep"></div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="scrollToMonth(currentMonth-1)">← Prev</button>
    <button class="nav-btn" onclick="scrollToMonth(currentMonth+1)">Next →</button>
    <button class="nav-btn" onclick="scrollToToday()">Today</button>
  </div>
</div>

<div class="legend">
  <span class="leg"><span class="leg-dot" style="background:var(--c-sub)"></span>Submission</span>
  <span class="leg"><span class="leg-dot" style="background:var(--c-dec)"></span>Decision</span>
  <span class="leg"><span class="leg-dot" style="background:var(--c-rev)"></span>Review</span>
  <span class="leg"><span class="leg-dot" style="background:var(--c-rep)"></span>Report due</span>
  <span class="leg"><span class="leg-dot" style="background:var(--c-fld)"></span>Field &amp; Training</span>
  <span class="leg"><span class="leg-dot" style="background:var(--c-awd)"></span>Award</span>
  <span style="margin-left:auto;font-size:11px;color:var(--gray-400)">Click any event to view, edit, or delete</span>
</div>

<div class="layout">
  <div class="main" id="calWrap"></div>
  <div class="sidebar">
    <h3>Next 60 days</h3>
    <div id="upcomingList"></div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-bg" id="viewBg" onclick="closeBg(event,'viewBg')">
  <div class="modal">
    <button class="modal-close" onclick="closeView()">✕</button>
    <div class="modal-type-badge" id="v-badge"></div>
    <div class="modal-title" id="v-title"></div>
    <div class="modal-rows" id="v-rows"></div>
    <div class="modal-div"></div>
    <div class="modal-notes" id="v-notes"></div>
    <div class="modal-actions">
      <button class="modal-btn btn-edit" onclick="openEdit(currentEventId)">Edit</button>
      <button class="modal-btn btn-delete" onclick="deleteEvent(currentEventId)">Delete</button>
      <button class="modal-btn btn-cancel" onclick="closeView()">Close</button>
    </div>
  </div>
</div>

<!-- EDIT / ADD MODAL -->
<div class="modal-bg" id="editBg" onclick="closeBg(event,'editBg')">
  <div class="edit-modal">
    <button class="modal-close" onclick="closeEdit()">✕</button>
    <h2 id="edit-heading">Edit Event</h2>
    <div class="form-grid">
      <div class="form-group form-full">
        <label class="form-label">Title (full)</label>
        <input class="form-input" id="f-title" placeholder="Full event title"/>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Short label (shown on calendar chip)</label>
        <input class="form-input" id="f-short" placeholder="Brief label for calendar chip"/>
      </div>
      <div class="form-group">
        <label class="form-label">Month (0 = Jan … 11 = Dec)</label>
        <select class="form-select" id="f-month">
          <option value="0">January</option><option value="1">February</option>
          <option value="2">March</option><option value="3">April</option>
          <option value="4">May</option><option value="5">June</option>
          <option value="6">July</option><option value="7">August</option>
          <option value="8">September</option><option value="9">October</option>
          <option value="10">November</option><option value="11">December</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Day</label>
        <input class="form-input" id="f-day" type="number" min="1" max="31" placeholder="1-31"/>
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-select" id="f-type">
          <option value="submission">Submission</option>
          <option value="decision">Decision</option>
          <option value="review">Review</option>
          <option value="report">Report</option>
          <option value="fieldwork">Field &amp; Training</option>
          <option value="award">Award</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <input class="form-input" id="f-role" placeholder="PI, Co-I, Reviewer…"/>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Funder / Organization</label>
        <input class="form-input" id="f-funder" placeholder="NIH, UTHealth, etc."/>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Amount</label>
        <input class="form-input" id="f-amount" placeholder="e.g. $25,000 or R01 scale"/>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="f-notes" placeholder="Any relevant details, action items, or context…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="modal-btn btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS_FULL=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const TYPE_LABELS={submission:'Submission deadline',decision:'Decision expected',review:'Review / Study section',report:'Report due',fieldwork:'Field & Training',award:'Award / Fellowship'};
const TYPE_COLORS={submission:'var(--c-sub)',decision:'var(--c-dec)',review:'var(--c-rev)',report:'var(--c-rep)',fieldwork:'var(--c-fld)',award:'var(--c-awd)'};
const TYPE_BG={submission:'var(--c-sub-lt)',decision:'var(--c-dec-lt)',review:'var(--c-rev-lt)',report:'var(--c-rep-lt)',fieldwork:'var(--c-fld-lt)',award:'var(--c-awd-lt)'};

const today=new Date();
let currentFilter='all';
let currentMonth=today.getMonth();
let currentEventId=null;
let editingId=null;
let events=[];

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadEvents(){
  try{
    const r=await fetch('events.json?v='+Date.now());
    if(!r.ok)throw new Error('fetch failed');
    events=await r.json();
  }catch(e){
    // fallback: try localStorage override
    const stored=localStorage.getItem('chip_events_override');
    if(stored){events=JSON.parse(stored);}
    else{events=[];showToast('Could not load events.json — make sure it is in the same folder as index.html');}
  }
  // apply any local edits stored in localStorage
  const overrides=JSON.parse(localStorage.getItem('chip_events_override')||'null');
  if(overrides) events=overrides;
  renderAll();
}

function saveLocal(){
  localStorage.setItem('chip_events_override',JSON.stringify(events));
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function buildMonth(month){
  const year=2026;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthEvs=events.filter(e=>e.month===month);

  let h=`<div class="month-title" id="month-${month}">${MONTHS_FULL[month]}</div>`;
  h+=`<div class="month-year">2026</div>`;
  h+=`<div class="cal-grid">`;
  DAYS.forEach(d=>{h+=`<div class="day-header">${d}</div>`;});
  for(let i=0;i<firstDay;i++) h+=`<div class="day-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===day;
    h+=`<div class="day-cell${isToday?' today':''}">`;
    h+=`<div class="day-num">${day}</div>`;
    const dayEvs=monthEvs.filter(e=>e.day===day);
    const show=dayEvs.slice(0,3),extra=dayEvs.slice(3);
    show.forEach(ev=>{
      const hidden=currentFilter!=='all'&&currentFilter!==ev.type?' hidden':'';
      h+=`<div class="event-chip t-${ev.type}${hidden}" onclick="openView('${ev.id}')">${ev.short||ev.title}</div>`;
    });
    if(extra.length) h+=`<div class="more-chip">+${extra.length} more — click to see all</div>`;
    h+=`</div>`;
  }
  const rem=(firstDay+daysInMonth)%7;
  if(rem>0) for(let i=rem;i<7;i++) h+=`<div class="day-cell empty"></div>`;
  h+=`</div>`;
  return h;
}

function renderAll(){
  let h='';
  for(let m=0;m<12;m++) h+=buildMonth(m);
  document.getElementById('calWrap').innerHTML=h;
  buildUpcoming();
}

function applyFilter(){
  document.querySelectorAll('.event-chip').forEach(c=>{
    if(currentFilter==='all'){c.classList.remove('hidden');return;}
    c.classList.toggle('hidden',!c.classList.contains(`t-${currentFilter}`));
  });
}

function setFilter(type,btn){
  currentFilter=type;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function scrollToMonth(m){
  if(m<0)m=0;if(m>11)m=11;
  currentMonth=m;
  const el=document.getElementById(`month-${m}`);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}
function scrollToToday(){scrollToMonth(today.getMonth());}

// ── UPCOMING ──────────────────────────────────────────────────────────────────
function buildUpcoming(){
  const now=new Date();now.setHours(0,0,0,0);
  const cut=new Date(now);cut.setDate(cut.getDate()+60);
  const up=events.filter(e=>{
    const d=new Date(2026,e.month,e.day);
    return d>=now&&d<=cut;
  }).sort((a,b)=>new Date(2026,a.month,a.day)-new Date(2026,b.month,b.day));
  const list=document.getElementById('upcomingList');
  if(!up.length){list.innerHTML='<p style="font-size:11px;color:var(--gray-400)">Nothing in the next 60 days.</p>';return;}
  list.innerHTML=up.map(ev=>{
    const d=new Date(2026,ev.month,ev.day);
    const diff=Math.round((d-now)/86400000);
    const col=diff<=7?'var(--c-rep)':diff<=14?'var(--c-rev)':'var(--gray-400)';
    const mm=String(ev.month+1).padStart(2,'0'),dd=String(ev.day).padStart(2,'0');
    return`<div class="upcoming-item" onclick="openView('${ev.id}')">
      <div class="upcoming-date" style="color:${col}">${mm}/${dd}<br>${diff}d</div>
      <div><div class="upcoming-text">${ev.short||ev.title}</div><div class="upcoming-funder">${ev.funder}</div></div>
    </div>`;
  }).join('');
}

// ── VIEW MODAL ────────────────────────────────────────────────────────────────
function openView(id){
  const ev=events.find(e=>e.id===id);if(!ev)return;
  currentEventId=id;
  const badge=document.getElementById('v-badge');
  badge.textContent=TYPE_LABELS[ev.type]||ev.type;
  badge.style.background=TYPE_BG[ev.type];
  badge.style.color=TYPE_COLORS[ev.type];
  document.getElementById('v-title').textContent=ev.title;
  const rows=[
    ['Date',`${MONTHS_FULL[ev.month]} ${ev.day}, 2026`],
    ['Funder',ev.funder],
    ev.amount?['Amount',ev.amount]:null,
    ['Role',ev.role],
  ].filter(Boolean);
  document.getElementById('v-rows').innerHTML=rows.map(([l,v])=>
    `<div class="modal-row"><span class="modal-lbl">${l}</span><span class="modal-val">${v}</span></div>`
  ).join('');
  document.getElementById('v-notes').textContent=ev.notes||'No notes.';
  document.getElementById('viewBg').classList.add('open');
}
function closeView(){document.getElementById('viewBg').classList.remove('open');currentEventId=null;}

// ── EDIT MODAL ────────────────────────────────────────────────────────────────
function openEdit(id){
  closeView();
  const ev=events.find(e=>e.id===id);if(!ev)return;
  editingId=id;
  document.getElementById('edit-heading').textContent='Edit Event';
  document.getElementById('f-title').value=ev.title||'';
  document.getElementById('f-short').value=ev.short||'';
  document.getElementById('f-month').value=ev.month;
  document.getElementById('f-day').value=ev.day;
  document.getElementById('f-type').value=ev.type;
  document.getElementById('f-role').value=ev.role||'';
  document.getElementById('f-funder').value=ev.funder||'';
  document.getElementById('f-amount').value=ev.amount||'';
  document.getElementById('f-notes').value=ev.notes||'';
  document.getElementById('editBg').classList.add('open');
}
function openAdd(){
  editingId=null;
  document.getElementById('edit-heading').textContent='Add Event';
  ['f-title','f-short','f-role','f-funder','f-amount','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-month').value=today.getMonth();
  document.getElementById('f-day').value=today.getDate();
  document.getElementById('f-type').value='submission';
  document.getElementById('editBg').classList.add('open');
}
function closeEdit(){document.getElementById('editBg').classList.remove('open');editingId=null;}

function saveEvent(){
  const data={
    title:document.getElementById('f-title').value.trim()||'Untitled Event',
    short:document.getElementById('f-short').value.trim(),
    month:parseInt(document.getElementById('f-month').value),
    day:parseInt(document.getElementById('f-day').value)||1,
    type:document.getElementById('f-type').value,
    role:document.getElementById('f-role').value.trim(),
    funder:document.getElementById('f-funder').value.trim(),
    amount:document.getElementById('f-amount').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
  };
  if(editingId){
    const idx=events.findIndex(e=>e.id===editingId);
    events[idx]={...events[idx],...data};
    showToast('Event updated');
  }else{
    data.id='e'+Date.now();
    events.push(data);
    showToast('Event added');
  }
  saveLocal();
  closeEdit();
  renderAll();
}

function deleteEvent(id){
  if(!confirm('Delete this event? This cannot be undone.'))return;
  events=events.filter(e=>e.id!==id);
  saveLocal();
  closeView();
  renderAll();
  showToast('Event deleted');
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportJSON(){
  const blob=new Blob([JSON.stringify(events,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='events.json';
  a.click();
  showToast('events.json downloaded — replace the file in your GitHub repo');
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function closeBg(e,id){if(e.target===document.getElementById(id)){if(id==='viewBg')closeView();else closeEdit();}}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('todayStr').textContent=today.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'});

// Add export button to header
document.querySelector('.header-actions').insertAdjacentHTML('afterbegin',
  '<button class="hdr-btn" onclick="exportJSON()">Export JSON</button>'
);

loadEvents().then(()=>{scrollToMonth(today.getMonth());});
</script>
